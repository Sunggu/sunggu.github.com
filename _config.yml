# Welcome to Jekyll!
#
# Site settings
title: Starkapin's page
email: yuseungku@gmail.com
description: "Starkapin의 개발 및 일상 기록 블로그입니다."
tagline: "to live like a human being"
baseurl: ""
url: "https://binarygap.com"
repository: Sunggu/sunggu.github.com
github: Sunggu
lang: ko

# SEO & Analytics
google_site_verification: "" # Google Search Console verification code
naver_site_verification: ""  # Naver Webmaster Tools verification code
google_analytics:

comments: false

author: Seungku Yu
author_bio: "Starkapin's page - to live like a human being"
author_pic: ""

paginate: 5
paginate_path: "/:num/"

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
permalink: /:title

theme_switcher: false

# Allows all pages to be put into `_pages` folder
# for easier navigation and better SEO.
collections:
  pages:
    output: true
    permalink: /:title

# Exclude from processing.
exclude:
  - ".jekyll-cache"
  - "Gemfile"
  - "Gemfile.lock"
  - "theme"
  - "sandbox"
