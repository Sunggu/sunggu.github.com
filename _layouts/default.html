<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{%- include head.html -%}

<body class="container">

    <a class="skip-main" href="#content">Skip to main content</a>
    <div id="top" class="page" role="document">
    {%- include header.html -%}

    <main aria-label="Content">
        <div id="content">
            {{ content }}
        </div>
    </main>

    {%- include footer.html -%}
    </div>
    {%- if site.theme_switcher -%}
    <script src="{{ '/assets/switcher.js' | relative_url }}" type="text/javascript"></script>
    {%- endif -%}
    
    <!-- Simple-Jekyll-Search 라이브러리 및 초기화 -->
    <script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
    <script>
      SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('results-container'),
        json: '{{ "/search.json" | relative_url }}',
        searchResultTemplate: '<li><a href="{url}">{title}</a><span style="font-size: 0.8rem; color: #666; margin-left: 10px;">{date}</span></li>',
        noResultsText: '<li>검색 결과가 없습니다.</li>',
        limit: 10,
        fuzzy: false
      });
    </script>
</body>

</html>
